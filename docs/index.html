<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eversports – Wochenplan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f0f2f5; color: #1a1a1a; padding: 16px 12px 40px; }

    /* Header */
    .header { max-width: 700px; margin: 0 auto 12px; display: flex; align-items: baseline; gap: 10px; }
    h1 { font-size: 20px; font-weight: 700; }
    .week-label { font-size: 13px; color: #888; }

    /* Lock banner */
    .lock-banner { max-width: 700px; margin: 0 auto 12px;
                   background: #fef3c7; color: #92400e; border-radius: 10px;
                   padding: 8px 14px; font-size: 13px; font-weight: 500; display: none; }
    .lock-banner.visible { display: block; }

    /* Timetable wrapper — horizontal scroll on small screens */
    .timetable-wrap { max-width: 700px; margin: 0 auto; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { border-collapse: collapse; width: 100%; min-width: 340px; }

    /* Column headers */
    thead th { padding: 6px 4px 10px; text-align: center; font-size: 12px;
               font-weight: 600; white-space: nowrap; }
    thead th.time-col { width: 44px; font-weight: 400; color: #aaa; }
    .col-day   { font-size: 13px; font-weight: 700; }
    .col-date  { font-size: 11px; color: #888; font-weight: 400; }
    .col-book  { font-size: 10px; color: #bbb; font-weight: 400; }
    .col-past  { opacity: .4; }

    /* Time rows */
    tbody td { height: 36px; border: 1px solid #e8e8e8; text-align: center;
               vertical-align: middle; background: white; }
    tbody td.time-col { background: transparent; border: none;
                        font-size: 11px; color: #aaa; padding-right: 6px;
                        text-align: right; white-space: nowrap; }

    /* Slot states */
    .slot-empty    { background: #fafafa; cursor: default; }
    .slot-avail    { cursor: pointer; transition: filter .15s; }
    .slot-avail:hover { filter: brightness(.93); }
    .slot-on       { cursor: pointer; }
    .slot-on:hover { filter: brightness(.9); }
    .slot-past     { opacity: .45; cursor: default !important; }

    /* Slot content */
    .slot-inner { display: flex; flex-direction: column; align-items: center;
                  justify-content: center; height: 100%; padding: 2px; }
    .slot-check { font-size: 14px; color: white; font-weight: 700; line-height: 1; }
    .slot-title { font-size: 9px; line-height: 1; margin-top: 2px;
                  max-width: 54px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slot-on .slot-title { color: rgba(255,255,255,.85); }

    /* Zeit-Gap-Trenner */
    .time-gap td { height: 8px; background: #f0f2f5 !important; border-color: #f0f2f5 !important; }

    /* Lock button */
    .lock-wrap { max-width: 700px; margin: 14px auto 0; }
    .lock-btn { width: 100%; padding: 13px; border: none; border-radius: 12px;
                font-size: 15px; font-weight: 700; cursor: pointer; }
    .lock-btn.unlocked { background: #22c55e; color: white; }
    .lock-btn.locked   { background: #f59e0b; color: white; }

    /* Setup */
    .setup-wrap { max-width: 480px; margin: 40px auto; background: white;
                  border-radius: 14px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .setup-wrap h2 { font-size: 16px; margin-bottom: 8px; }
    .setup-wrap p  { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.6; }
    .setup-wrap a  { color: #22c55e; }
    input[type=text], input[type=password] { width: 100%; border: 1px solid #ddd;
      border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #22c55e; }
    button.primary { background: #22c55e; color: white; border: none; border-radius: 8px;
                     padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }

    /* Status */
    .status { max-width: 700px; margin: 10px auto 0;
              font-size: 13px; color: #888; text-align: center; min-height: 18px; }
    .status.error { color: #ef4444; }
    .empty-note { max-width: 700px; margin: 40px auto; text-align: center;
                  color: #888; font-size: 14px; line-height: 1.7; }
  </style>
</head>
<body>

<div id="setup" style="display:none">
  <div class="setup-wrap">
    <h2>Einrichtung</h2>
    <p>Einmalig: GitHub Token mit <strong>Gist-Schreibzugriff</strong> und die Gist-ID.</p>
    <p><a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank">Token erstellen →</a></p>
    <input type="password" id="token-input" placeholder="GitHub Token (ghp_...)">
    <input type="text"     id="gist-input"  placeholder="Gist ID">
    <button class="primary" onclick="saveSetup()">Speichern</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>Eversports</h1>
    <span class="week-label" id="week-label"></span>
  </div>
  <div class="lock-banner" id="lock-banner">
    Woche gesperrt – Buchungen laufen automatisch. Zum Bearbeiten unten entsperren.
  </div>
  <div class="timetable-wrap">
    <table id="timetable"></table>
  </div>
  <div class="lock-wrap">
    <button class="lock-btn unlocked" id="lock-btn" onclick="toggleLock()">Woche sperren</button>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
let schedule = null; // { week, locked, days }

// ── Config ────────────────────────────────────────────────
function cfg() { return { token: localStorage.getItem("gh_token"), gistId: localStorage.getItem("gist_id") }; }
function saveSetup() {
  const token  = document.getElementById("token-input").value.trim();
  const gistId = document.getElementById("gist-input").value.trim();
  if (!token || !gistId) return alert("Bitte beide Felder ausfüllen.");
  localStorage.setItem("gh_token", token);
  localStorage.setItem("gist_id", gistId);
  init();
}

// ── Gist I/O ──────────────────────────────────────────────
async function loadGist() {
  const { token, gistId } = cfg();
  const headers = token ? { Authorization: `Bearer ${token}` } : {};
  const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
  if (!res.ok) throw new Error(`Gist Fehler ${res.status}`);
  const data = await res.json();
  const raw  = data.files?.["schedule.json"]?.content;
  if (!raw) return { week: "–", locked: false, days: [] };
  const p = JSON.parse(raw);
  return { week: p.week ?? "–", locked: p.locked ?? false, days: p.days ?? [] };
}
async function saveGist() {
  const { token, gistId } = cfg();
  const res = await fetch(`https://api.github.com/gists/${gistId}`, {
    method: "PATCH",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ files: { "schedule.json": { content: JSON.stringify(schedule, null, 2) } } }),
  });
  if (!res.ok) throw new Error(`Speichern fehlgeschlagen ${res.status}`);
}

// ── Render ────────────────────────────────────────────────
function todayBerlin() {
  return new Date().toLocaleDateString("en-CA", { timeZone: "Europe/Berlin" });
}

function render() {
  document.getElementById("week-label").textContent = `Woche ${schedule.week}`;
  document.getElementById("lock-banner").classList.toggle("visible", schedule.locked);
  const btn = document.getElementById("lock-btn");
  btn.textContent = schedule.locked ? "Woche entsperren" : "Woche sperren";
  btn.className   = "lock-btn " + (schedule.locked ? "locked" : "unlocked");

  const days = schedule.days.filter(d => d.sessions.length > 0);
  const table = document.getElementById("timetable");

  if (days.length === 0) {
    table.closest(".timetable-wrap").innerHTML =
      '<p class="empty-note">Noch keine Kurse.<br>Wird jeden Sonntag automatisch befüllt.</p>';
    return;
  }

  // Alle vorkommenden Zeiten sammeln + sortieren
  const allTimes = [...new Set(days.flatMap(d => d.sessions.map(s => s.time)))].sort();
  const today    = todayBerlin();

  // Header
  let html = "<thead><tr><th class='time-col'></th>";
  for (const day of days) {
    const dt = new Date(day.date + "T12:00:00Z");
    const dayLabel  = dt.toLocaleDateString("de-DE", { weekday: "short", timeZone: "UTC" });
    const dateLabel = dt.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", timeZone: "UTC" });
    const bookDt    = new Date(day.bookingDate + "T12:00:00Z");
    const bookLabel = bookDt.toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit", timeZone: "UTC" });
    const isPast    = day.bookingDate < today;
    html += `<th class="${isPast ? "col-past" : ""}">
      <div class="col-day">${dayLabel}</div>
      <div class="col-date">${dateLabel}</div>
      <div class="col-book">→ ${bookLabel}</div>
    </th>`;
  }
  html += "</tr></thead><tbody>";

  // Rows — mit Gap-Trenner bei Stunden-Lücken > 1h
  for (let ti = 0; ti < allTimes.length; ti++) {
    const time = allTimes[ti];
    if (ti > 0) {
      const prevH = parseInt(allTimes[ti - 1]);
      const currH = parseInt(time);
      if (currH - prevH > 1) {
        html += `<tr class="time-gap"><td class="time-col"></td>${days.map(() => "<td></td>").join("")}</tr>`;
      }
    }
    html += `<tr><td class="time-col">${time}</td>`;
    for (const day of days) {
      const sess   = day.sessions.find(s => s.time === time);
      const isPast = day.bookingDate < today;
      if (!sess) {
        html += `<td class="slot-empty"></td>`;
      } else {
        const isOn      = day.enabled && day.selectedTime === time;
        const colors    = activityColors(sess.title, isOn);
        const stateClass = (isOn ? "slot-on" : "slot-avail") + (isPast ? " slot-past" : "");
        const clickable  = !isPast && !schedule.locked;
        const onclick    = clickable ? `onclick="selectSlot('${day.date}','${time}','${sess.uuid}',${isOn})"` : "";
        const label      = shortTitle(sess.title);
        html += `<td class="${stateClass}" style="background:${colors.bg}" ${onclick} title="${sess.title}">
          <div class="slot-inner">
            ${isOn ? '<span class="slot-check">✓</span>' : ""}
            ${label ? `<span class="slot-title" style="color:${colors.title}">${label}</span>` : ""}
          </div>
        </td>`;
      }
    }
    html += "</tr>";
  }
  html += "</tbody>";
  table.innerHTML = html;
}

// ── Helpers ───────────────────────────────────────────────
function activityColors(title, isOn) {
  const t = (title || "").toLowerCase();
  if (isOn) {
    if (t.includes("endurance")) return { bg: "#3b82f6", title: "rgba(255,255,255,.85)" };
    if (t.includes("weight"))    return { bg: "#f97316", title: "rgba(255,255,255,.85)" };
    if (t.includes("gymnast"))   return { bg: "#a855f7", title: "rgba(255,255,255,.85)" };
    return                              { bg: "#22c55e", title: "rgba(255,255,255,.85)" };
  } else {
    if (t.includes("endurance")) return { bg: "#eff6ff", title: "#1d4ed8" };
    if (t.includes("weight"))    return { bg: "#fff7ed", title: "#c2410c" };
    if (t.includes("gymnast"))   return { bg: "#faf5ff", title: "#7c3aed" };
    return                              { bg: "#f0fdf4", title: "#166534" };
  }
}
function shortTitle(title) {
  if (!title) return "";
  // "WOD (Workout Of the Day)" → "WOD", "Gymnastics & Skills" → "Gymnastics"
  return title.split(/[\s(]/)[0];
}

// ── Actions ───────────────────────────────────────────────
function findDay(date) { return schedule.days.find(d => d.date === date); }

async function selectSlot(date, time, uuid, wasOn) {
  if (schedule.locked) return;
  const day = findDay(date);
  if (!day) return;
  if (wasOn) {
    // Deaktivieren
    day.enabled      = false;
    day.selectedTime = null;
    day.selectedUuid = null;
  } else {
    // Slot wählen und aktivieren
    day.enabled      = true;
    day.selectedTime = time;
    day.selectedUuid = uuid;
  }
  render();
  await persist();
}

async function toggleLock() {
  schedule.locked = !schedule.locked;
  render();
  await persist();
}

async function persist() {
  const el = document.getElementById("status");
  el.textContent = "Speichern…"; el.className = "status";
  try {
    await saveGist();
    el.textContent = "Gespeichert";
    setTimeout(() => el.textContent = "", 2000);
  } catch (e) {
    el.textContent = "Fehler: " + e.message;
    el.className = "status error";
  }
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  const { token, gistId } = cfg();
  if (!token || !gistId) {
    document.getElementById("setup").style.display = "block";
    document.getElementById("app").style.display   = "none";
    return;
  }
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").style.display   = "block";
  const el = document.getElementById("status");
  el.textContent = "Lade…";
  try {
    schedule = await loadGist();
    render();
    el.textContent = "";
  } catch(e) {
    el.textContent = e.message; el.className = "status error";
  }
}

init();
</script>
</body>
</html>
