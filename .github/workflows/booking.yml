name: eversports-booking

on:
  schedule:
    # So 08:00 UTC → 10:00 Berlin: Wochenvorschau + Notification
    - cron: "0 8 * * 0"
    # Mo 07:45 UTC → wartet auf 10:00 Berlin (Sa-Kurs, 2-Wochen-Rhythmus)
    - cron: "45 7 * * 1"
    # So/Mi/Do 14:45 UTC → wartet auf 17:00 Berlin (Fr/Mo/Di-Kurs)
    - cron: "45 14 * * 0,3,4"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Restore auth
        run: echo '${{ secrets.EVERSPORTS_AUTH }}' > auth.json

      - name: Run notify (nur sonntags 08:00 UTC)
        if: github.event.schedule == '0 8 * * 0' || github.event_name == 'workflow_dispatch'
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node notify.js

      - name: Run booking (alle anderen Crons)
        if: github.event.schedule != '0 8 * * 0'
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
        run: node book.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshot-*.png
          if-no-files-found: ignore