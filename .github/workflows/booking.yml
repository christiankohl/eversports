name: eversports-booking

on:
  schedule:
    # Mo 07:45 UTC → wartet auf 10:00 Berlin (Sa-Kurs, 2-Wochen-Rhythmus)
    # Max. Wartezeit: ~15 min (Sommer) / ~75 min (Winter)
    - cron: "45 7 * * 1"
    # So/Mi/Do 14:45 UTC → wartet auf 17:00 Berlin (Fr/Mo/Di-Kurs)
    # Max. Wartezeit: ~15 min (Sommer) / ~75 min (Winter)
    - cron: "45 14 * * 0,3,4"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Restore auth
        run: echo '${{ secrets.EVERSPORTS_AUTH }}' > auth.json

      - name: Run booking
        run: node book.js